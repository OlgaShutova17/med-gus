version: '3.9'

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: meddnevnik
      POSTGRES_USER: med
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-strongpassword123}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U med -d meddnevnik"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  backend:
    build: .
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: always

volumes:
  pgdata:
